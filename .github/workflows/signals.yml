name: 5m Candle Signal Bot

# Runs in GitHub's cloud — fetches LIVE Binance data and sends alerts.
on:
  schedule:
    # Every 5 minutes. NOTE: GitHub cron is best-effort and can run a few
    # minutes late under load; it is not perfectly aligned to candle opens.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button

# Avoid overlapping runs if one is slow.
concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run one signal pass (live data)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_once.py
